worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    # ── Upstream definitions ────────────────────────────────────────────────
    # Horizontal scaling: add more servers per upstream block and nginx
    # automatically load-balances in round-robin.
    upstream order_service {
        server order-service:8000;
        # server order-service-2:8000;   # add replicas here
    }

    upstream inventory_service {
        server inventory-service:8000;
    }

    upstream payment_service {
        server payment-service:3000;
    }

    upstream notification_service {
        server notification-service:5000;
    }

    # ── Main server block ───────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            return 200 '{"status":"api-gateway-ok"}';
            add_header Content-Type application/json;
        }

        # ── Orders (Order Service) ─────────────────────────────────────────
        location /api/orders {
            proxy_pass         http://order_service/api/orders;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Saga / Distributed transactions ───────────────────────────────
        location /api/saga {
            proxy_pass         http://order_service/api/saga;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── Products / Inventory (Inventory Service) ───────────────────────
        location /api/products {
            proxy_pass         http://inventory_service/api/products;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location /api/reservations {
            proxy_pass         http://inventory_service/api/reservations;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Payments (Payment Service – Node.js) ───────────────────────────
        location /api/payments {
            proxy_pass         http://payment_service/api/payments;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Notifications (Notification Service – Python) ──────────────────
        location /api/notifications {
            proxy_pass         http://notification_service/api/notifications;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Default – 404
        location / {
            return 404 '{"error":"route not found"}';
            add_header Content-Type application/json;
        }
    }
}
